# Docker Compose — QNAP TEST: dashboard ONLY.
#
# Story 81 (2026-07-24): TEST is cut over to PostgreSQL as primary — the
# ONLY environment cut over so far (PROD stays on Mongo, see
# docker-compose.qnap.prod.yml, deliberately untouched by this Story).
# QNAP's `chad-postgres` (docker-compose.qnap.shared.yml) currently holds
# ONLY test3's migrated data — DBA_POSTGRES_REPO_ALLOWLIST below rejects
# any write for a different repoGuid instead of silently creating a
# divergent island of data (see packages/dba/src/data-providers/
# repo-allowlist-guard.ts, backlog/stories/81/).
#
# TEST is otherwise still an alternative UI onto the SAME live Mongo data
# as PROD for Beeper (BEEPER_MONGODB_URI below, unaffected by this Story).
# Never starts/stops/rebuilds shared services itself — see
# bash-scripts/dashboard/04_qnap_test/03_re-start.sh, which refuses to
# start unless shared services are already up and healthy.
#
# Content Provider (content-provider-api) removed from this stack. See
# docker-compose.qnap.shared.yml's header comment for the
# reversible-removal note.
#
# Used by bash-scripts/dashboard/04_qnap_test/*.sh, plus
# bash-scripts/dashboard/06_qnap_test_ssh/*.sh (thin SSH wrappers over
# those). Env file: .env.qnap.
services:
  dashboard:
    # No ":latest" fallback - own CHAD images must be deployed by an explicit
    # release tag (see ai-docs/bash-scripts/image-tagging-standard.md).
    # 04_qnap_test/03_re-start.sh sets IMAGE_TAG before calling this; the
    # required-var syntax below is a defense-in-depth backstop.
    image: "chad-dashboard:${IMAGE_TAG:?IMAGE_TAG is required, see ai-docs/bash-scripts/image-tagging-standard.md}"
    build:
      context: .
      dockerfile: packages/dashboard/Dockerfile
      target: runner
      # Records the exact commit the TEST image was built from (Story 63) —
      # read back by bash-scripts/dashboard/07_qnap_prod_ssh/06_last_from_test.sh
      # before promoting this image to PROD, and by anyone running `docker
      # inspect` on chad-dashboard-test. Standard OCI label, not a custom one.
      labels:
        org.opencontainers.image.revision: "${GIT_SHA:-unknown}"
    container_name: chad-dashboard-test
    restart: unless-stopped
    ports:
      - "${DASHBOARD_PORT}:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - DATABASE_URL=file:/app/data/dev.db
      # Same shared chad-mongodb this file's own header comment describes
      # (TEST is not an isolated environment — it reads/writes the SAME
      # data as PROD, same as it already does for Content Provider). Added
      # to close a gap where this env block was never updated when Mongo
      # was wired into packages/dba (docker-compose.local.yml already had
      # this) — without it, MongoCpProvider throws "MONGODB_URI environment
      # variable is not set" on every request.
      - MONGODB_URI=mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@chad-mongodb:27017/chad?authSource=admin
      # Beeper CRM's Mongo *server* URI — the SEPARATE beeper-mongodb
      # container (Story 76, 2026-07-22 physical split; previously pointed
      # at chad-mongodb, same as MONGODB_URI above). No database segment
      # (Story 73: each CHAD user gets their own `beeper_<repoGuid>`
      # database, computed by packages/dba/src/mongo.ts's
      # getBeeperMongoDb(), never taken from this URI — see
      # documentation/beeper/architecture.md). Own credentials, not
      # MONGO_ROOT_USERNAME/PASSWORD — least privilege.
      - BEEPER_MONGODB_URI=mongodb://${BEEPER_MONGO_ROOT_USERNAME}:${BEEPER_MONGO_ROOT_PASSWORD}@beeper-mongodb:27017?authSource=admin
      # Story 81 — QNAP TEST cutover to PostgreSQL. TEMPORARILY ROLLED BACK
      # to mongo primary: leads.ts's business functions (saveDateEntry etc.)
      # turned out to only branch on mongoEnabled/contentProviderEnabled,
      # with no postgresEnabled case — real Daily/Dates read/write would
      # silently no-op on Postgres until that's fixed (see
      # backlog/stories/81/05_tasks_and_checklist.md, Task 8). Re-enable
      # once leads.ts is fixed and re-verified. Deliberately HARDCODED
      # literal values, NOT ${DBA_PRIMARY_BACKEND:-mongo} reading the
      # shared .env.qnap — docker-compose.qnap.prod.yml reads that exact
      # same shared env var name; a plain default-value read here would
      # silently apply to PROD too on its next restart/redeploy. See
      # backlog/stories/81/02_plan.md.
      - DBA_MONGO_ENABLED=true
      - DBA_POSTGRES_ENABLED=true
      - DBA_PRIMARY_BACKEND=mongo
      - DBA_CONTENT_PROVIDER_ENABLED=${DBA_CONTENT_PROVIDER_ENABLED:-false}
      # Story 81 — data-sync outbox worker, wired into this process
      # (data-outbox-bootstrap.ts) for the first time. Stays inert here
      # while DBA_CONTENT_PROVIDER_ENABLED is false (nothing to follow
      # toward — see that file's own startDataOutboxWorkerIfEnabled doc
      # comment): present so the worker is exercised/logged, not because
      # it has real work to do on TEST today.
      - DBA_DATA_OUTBOX_WORKER_ENABLED=true
      # chad-postgres (docker-compose.qnap.shared.yml) — POSTGRES_USER/
      # PASSWORD/DB come from .env.qnap but are safe there: PROD's compose
      # file never references these var names, so their presence has zero
      # effect on PROD's interpolation (unlike DBA_PRIMARY_BACKEND above).
      - POSTGRES_URI=postgres://${POSTGRES_USER:-chad}:${POSTGRES_PASSWORD}@chad-postgres:5432/${POSTGRES_DB:-chad}
      # Transitional safety net (Story 81) — chad-postgres currently holds
      # only test3's data; reject any write for a different repoGuid
      # instead of silently creating a divergent island of data. Remove
      # once every real repo has been migrated to Postgres.
      - DBA_POSTGRES_REPO_ALLOWLIST=5a9c8b7d-6e5f-4a3b-2c1d-0e9f8a7b6c5d
      # Deliberately "test", never "prod" — even though TEST shares the
      # exact same chad-mongodb data as PROD (this file's own header
      # comment), the Google Sheets sync worker
      # (packages/dba/src/google-sheets/production-guard.ts) refuses to
      # start unless CHAD_ENVIRONMENT is exactly "prod".
      - CHAD_ENVIRONMENT=test
      # Story 78 — info-page-only vars (History -> Google Sheets link/info),
      # deliberately NOT the full write-sync block: no GOOGLE_SHEETS_ENABLED
      # (stays unset here, so the worker/outbox never starts — see
      # production-guard.ts) and no GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY (not
      # needed to show a link, never present on TEST at all). Both vars
      # below are non-secret — a spreadsheet ID or a service-account email
      # grants nothing without the separately-secret private key, which
      # stays PROD-only. See loadGoogleSheetsInfoConfig() in
      # packages/dba/src/google-sheets/config.ts.
      - GOOGLE_SHEETS_SPREADSHEET_MAP=${GOOGLE_SHEETS_SPREADSHEET_MAP:-}
      - GOOGLE_SERVICE_ACCOUNT_EMAIL=${GOOGLE_SERVICE_ACCOUNT_EMAIL:-}
    volumes:
      - chad-dashboard-test-data:/app/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  chad-dashboard-test-data:
    name: chad-dashboard-qnap-test-data

networks:
  default:
    name: chad-shared
    external: true
