# Docker Compose — QNAP TEST: dashboard ONLY.
#
# TEST is an alternative UI onto the SAME live data as PROD — not an
# isolated/sandboxed environment. It talks to the SAME shared MongoDB
# (chad-mongodb) started by docker-compose.qnap.shared.yml
# (bash-scripts/dashboard/00_qnap_shared/). Never starts/stops/rebuilds
# shared services itself — see bash-scripts/dashboard/04_qnap_test/03_restart.sh,
# which refuses to start unless shared services are already up and healthy.
#
# Content Provider (content-provider-api) removed from this stack — Mongo
# is the only active runtime backend now. See docker-compose.qnap.shared.yml's
# header comment for the reversible-removal note.
#
# Used by bash-scripts/dashboard/04_qnap_test/*.sh, plus
# bash-scripts/dashboard/06_qnap_test_ssh/*.sh (thin SSH wrappers over
# those). Env file: .env.qnap.
services:
  dashboard:
    # No ":latest" fallback - own CHAD images must be deployed by an explicit
    # release tag (see documentation/ai-docs/deploy/image-tagging-standard.md).
    # 04_qnap_test/03_restart.sh sets IMAGE_TAG before calling this; the
    # required-var syntax below is a defense-in-depth backstop.
    image: "chad-dashboard:${IMAGE_TAG:?IMAGE_TAG is required, see documentation/ai-docs/deploy/image-tagging-standard.md}"
    build:
      context: .
      dockerfile: packages/dashboard/Dockerfile
      target: runner
      # Records the exact commit the TEST image was built from (Story 63) —
      # read back by bash-scripts/dashboard/07_qnap_prod_ssh/06_last_from_test.sh
      # before promoting this image to PROD, and by anyone running `docker
      # inspect` on chad-dashboard-test. Standard OCI label, not a custom one.
      labels:
        org.opencontainers.image.revision: "${GIT_SHA:-unknown}"
    container_name: chad-dashboard-test
    restart: unless-stopped
    ports:
      - "${DASHBOARD_PORT}:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - DATABASE_URL=file:/app/data/dev.db
      # Same shared chad-mongodb this file's own header comment describes
      # (TEST is not an isolated environment — it reads/writes the SAME
      # data as PROD, same as it already does for Content Provider). Added
      # to close a gap where this env block was never updated when Mongo
      # was wired into packages/dba (docker-compose.local.yml already had
      # this) — without it, MongoCpProvider throws "MONGODB_URI environment
      # variable is not set" on every request.
      - MONGODB_URI=mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@chad-mongodb:27017/chad?authSource=admin
      # Beeper CRM's own database — same chad-mongodb container, separate
      # `beeper` database (contacts/channels/messages/timeline_events).
      - BEEPER_MONGODB_URI=mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@chad-mongodb:27017/beeper?authSource=admin
      - DBA_MONGO_ENABLED=${DBA_MONGO_ENABLED:-true}
      - DBA_CONTENT_PROVIDER_ENABLED=${DBA_CONTENT_PROVIDER_ENABLED:-false}
      - DBA_PRIMARY_BACKEND=${DBA_PRIMARY_BACKEND:-mongo}
    volumes:
      - chad-dashboard-test-data:/app/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  chad-dashboard-test-data:
    name: chad-dashboard-qnap-test-data

networks:
  default:
    name: chad-shared
    external: true
