# Docker Compose — QNAP TEST environment
#
# Runtime na QNAP to WYŁĄCZNIE docker-compose (bez tmuxinator — tmuxinator jest
# tylko lokalnym workflow developerskim, patrz .tmuxinator.yml / docker-compose.mac.yml).
#
# Dane MongoDB MUSZĄ być na trwałym bind mouncie QNAP, nie w warstwie kontenera.
# Ścieżkę bazową ustaw przez QNAP_CONTAINER_DATA_PATH (analogicznie do
# QNAP_CP_ROOT_PATH używanego przez packages/dashboard/docker-compose.qnap.test.yml
# dla Content Providera).
#
# Domyślny port 27018 (inny niż prod 27017), żeby test i prod mogły
# działać równolegle na tym samym QNAP — tak jak content-provider-api
# test/prod różnią się portem (12024 vs 12034 w packages/dashboard).
#
# PRZYGOTOWANE, NIE WDROŻONE (2026-07-10): mongodb działa jako single-node
# replica set (rs0), bo beeper-oplog wymaga change streams. Init jest
# idempotentny (mongo-rs-init, patrz bash-scripts/mongo/rs-init.js) — bezpieczny
# do wielokrotnego uruchomienia. Zanim to pójdzie na realny QNAP, patrz
# documentation/ai-docs/2026-07-10_mongodb-replica-set-migration-plan.md —
# opisuje bezstratną migrację z istniejącego standalone i wymóg
# `directConnection=true` po stronie klientów (w tym Mac przez Tailscale).

services:
  # MongoDB requires security.keyFile whenever auth + --replSet are combined,
  # even for a single-node replica set — discovered via local testing
  # (mongod refused to start with "BadValue: security.keyFile is required
  # when authorization is enabled with replica sets"). This generates it
  # inside the container (not via a host bind-mount with pre-set
  # permissions) so it works identically on macOS (dev) and QNAP (Linux):
  # ownership/perm bits are set by a Linux process either way, avoiding
  # host-OS bind-mount permission quirks. Idempotent: skips generation if
  # the file already exists (won't rotate the key under a running replica set).
  mongo-keyfile-init:
    image: mongo:7
    container_name: chad-mongo-keyfile-init-test
    restart: "no"
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -e
        if [ -f /keyfile-data/mongo-keyfile ]; then
          echo "Keyfile already exists, leaving it as-is."
        else
          echo "Generating new mongo keyfile..."
          openssl rand -base64 756 > /keyfile-data/mongo-keyfile
        fi
        chmod 400 /keyfile-data/mongo-keyfile
        chown 999:999 /keyfile-data/mongo-keyfile
    volumes:
      - "${QNAP_CONTAINER_DATA_PATH:-/share/ContainerData}/chad-test/mongodb/keyfile:/keyfile-data"

  mongodb:
    image: mongo:7
    container_name: chad-mongodb-test
    restart: unless-stopped
    command: ["--replSet", "rs0", "--bind_ip_all", "--keyFile", "/data/mongo-keyfile"]
    depends_on:
      mongo-keyfile-init:
        condition: service_completed_successfully
    ports:
      - "${MONGODB_TEST_PORT:-27018}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: "${MONGO_ROOT_USERNAME}"
      MONGO_INITDB_ROOT_PASSWORD: "${MONGO_ROOT_PASSWORD}"
    volumes:
      - "${QNAP_CONTAINER_DATA_PATH:-/share/ContainerData}/chad-test/mongodb/db:/data/db"
      - "${QNAP_CONTAINER_DATA_PATH:-/share/ContainerData}/chad-test/mongodb/configdb:/data/configdb"
      - "${QNAP_CONTAINER_DATA_PATH:-/share/ContainerData}/chad-test/mongodb/backups:/backups"
      - "${QNAP_CONTAINER_DATA_PATH:-/share/ContainerData}/chad-test/mongodb/keyfile/mongo-keyfile:/data/mongo-keyfile:ro"
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "--quiet",
          "--eval",
          "db.adminCommand('ping')",
          "-u",
          "${MONGO_ROOT_USERNAME}",
          "-p",
          "${MONGO_ROOT_PASSWORD}",
          "--authenticationDatabase",
          "admin",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  mongo-rs-init:
    image: mongo:7
    container_name: chad-mongo-rs-init-test
    restart: "no"
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./bash-scripts/mongo/rs-init.js:/mongo-rs-init.js:ro
    entrypoint:
      - mongosh
      - "mongodb://mongodb:27017/admin"
      - "-u"
      - "${MONGO_ROOT_USERNAME}"
      - "-p"
      - "${MONGO_ROOT_PASSWORD}"
      - "--authenticationDatabase"
      - "admin"
      - "/mongo-rs-init.js"
