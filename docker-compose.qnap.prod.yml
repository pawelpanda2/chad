# Docker Compose — QNAP PROD: dashboard ONLY.
#
# Uses the SAME shared MongoDB (chad-mongodb) as TEST — started by
# docker-compose.qnap.shared.yml (bash-scripts/dashboard/00_qnap_shared/).
# Never starts/stops/rebuilds shared services itself — see
# bash-scripts/dashboard/05_qnap_prod/03_re-start.sh, which refuses to start
# unless shared services are already up and healthy.
#
# Content Provider (content-provider-api) removed from this stack — Mongo
# is the only active runtime backend now. See docker-compose.qnap.shared.yml's
# header comment for the reversible-removal note.
#
# Used by bash-scripts/dashboard/05_qnap_prod/*.sh, plus
# bash-scripts/dashboard/07_qnap_prod_ssh/*.sh (thin SSH wrappers over
# those). Env file: .env.qnap.
#
# Deliberately NO `build:` section (Story 63): PROD never builds its own
# image — it only ever runs the exact image TEST already built and verified
# (docker-compose.qnap.test.yml), promoted via
# bash-scripts/dashboard/07_qnap_prod_ssh/06_last_from_test.sh. Removing
# `build:` here (not just deleting 05_qnap_prod/02_build.sh) makes an
# independent PROD build structurally impossible, not just undocumented.
services:
  dashboard:
    # No ":latest" fallback - own CHAD images must be deployed by an explicit
    # release tag (see ai-docs/bash-scripts/image-tagging-standard.md).
    # 05_qnap_prod/03_re-start.sh sets IMAGE_TAG before calling this; the
    # required-var syntax below is a defense-in-depth backstop.
    image: "chad-dashboard:${IMAGE_TAG:?IMAGE_TAG is required, see ai-docs/bash-scripts/image-tagging-standard.md}"
    container_name: chad-dashboard-prod
    restart: unless-stopped
    ports:
      - "${DASHBOARD_PORT}:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - DATABASE_URL=file:/app/data/dev.db
      # Same shared chad-mongodb as TEST (see this file's own header
      # comment). Added to close a gap where this env block was never
      # updated when Mongo was wired into packages/dba (docker-compose.local.yml
      # already had this) — without it, MongoCpProvider throws "MONGODB_URI
      # environment variable is not set" on every request.
      - MONGODB_URI=mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@chad-mongodb:27017/chad?authSource=admin
      # Beeper CRM's Mongo *server* URI — the SEPARATE beeper-mongodb
      # container (Story 76, 2026-07-22 physical split; previously pointed
      # at chad-mongodb, same as MONGODB_URI above). No database segment
      # (Story 73: each CHAD user gets their own `beeper_<repoGuid>`
      # database, computed by packages/dba/src/mongo.ts's
      # getBeeperMongoDb(), never taken from this URI — see
      # documentation/beeper/architecture.md). Own credentials, not
      # MONGO_ROOT_USERNAME/PASSWORD — least privilege.
      - BEEPER_MONGODB_URI=mongodb://${BEEPER_MONGO_ROOT_USERNAME}:${BEEPER_MONGO_ROOT_PASSWORD}@beeper-mongodb:27017?authSource=admin
      - DBA_MONGO_ENABLED=${DBA_MONGO_ENABLED:-true}
      - DBA_CONTENT_PROVIDER_ENABLED=${DBA_CONTENT_PROVIDER_ENABLED:-false}
      - DBA_PRIMARY_BACKEND=${DBA_PRIMARY_BACKEND:-mongo}
      # Identifies this as the one real production environment — the
      # Google Sheets sync worker (packages/dba/src/google-sheets/
      # production-guard.ts) refuses to start unless this is exactly
      # "prod", independent of GOOGLE_SHEETS_ENABLED below. Never set
      # anywhere else (docker-compose.qnap.test.yml intentionally does NOT
      # set this to "prod", even though TEST shares this same chad-mongodb
      # — see production-guard.ts's own doc comment).
      - CHAD_ENVIRONMENT=prod
      # Story 75 — Google Sheets sync. Unset/false by default (safe) —
      # only becomes active once .env.qnap sets GOOGLE_SHEETS_ENABLED=true
      # AND production-guard.ts's checks pass (CHAD_ENVIRONMENT=prod above
      # + MONGODB_URI resolving to a known production host, both already
      # satisfied on this file). See ai-docs/google-sheets/architecture.md.
      - GOOGLE_SHEETS_ENABLED=${GOOGLE_SHEETS_ENABLED:-false}
      - GOOGLE_SHEETS_SPREADSHEET_MAP=${GOOGLE_SHEETS_SPREADSHEET_MAP:-}
      - GOOGLE_SHEETS_DAILY_TRACKER_SHEET_NAME=${GOOGLE_SHEETS_DAILY_TRACKER_SHEET_NAME:-}
      - GOOGLE_SHEETS_DATE_ENTRIES_SHEET_NAME=${GOOGLE_SHEETS_DATE_ENTRIES_SHEET_NAME:-}
      - GOOGLE_SERVICE_ACCOUNT_EMAIL=${GOOGLE_SERVICE_ACCOUNT_EMAIL:-}
      - GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY=${GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY:-}
      - GOOGLE_SHEETS_VIEWER_ACCOUNT_EMAIL=${GOOGLE_SHEETS_VIEWER_ACCOUNT_EMAIL:-}
      - GOOGLE_SHEETS_VIEWER_ACCOUNT_PASSWORD=${GOOGLE_SHEETS_VIEWER_ACCOUNT_PASSWORD:-}
    volumes:
      - chad-dashboard-prod-data:/app/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  chad-dashboard-prod-data:
    name: chad-dashboard-qnap-prod-data

networks:
  default:
    name: chad-shared
    external: true
