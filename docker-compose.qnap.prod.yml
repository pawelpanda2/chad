# Docker Compose — QNAP PROD environment
#
# Runtime na QNAP to WYŁĄCZNIE docker-compose (bez tmuxinator).
#
# Dane MongoDB na trwałym bind mouncie QNAP — usunięcie kontenera
# (docker stop / docker rm) NIE usuwa danych, dopóki bind mount zostaje.
# Usuwa dane tylko skasowanie katalogu na hoście QNAP
# ($QNAP_CONTAINER_DATA_PATH/chad/mongodb/db).
#
# Backup logiczny: patrz bash-scripts/mongo/backup.sh (mongodump) —
# bezpieczniejszy niż kopiowanie aktywnych plików bazy. Snapshoty QNAP
# mogą być dodatkowym zabezpieczeniem, ale nie zastępują testowanego restore.
#
# PRZYGOTOWANE, NIE WDROŻONE (2026-07-10): tak jak w docker-compose.qnap.test.yml,
# mongodb jest skonfigurowane jako single-node replica set (rs0) z idempotentnym
# init-kontenerem. TA KONFIGURACJA MA POZOSTAĆ NIEUŻYWANA na produkcji, dopóki
# nie zostanie jawnie zatwierdzone jej uruchomienie — patrz
# documentation/ai-docs/2026-07-10_mongodb-replica-set-migration-plan.md.

services:
  # See docker-compose.qnap.test.yml for why this exists: MongoDB requires
  # security.keyFile whenever auth + --replSet are combined, even for a
  # single-node replica set (confirmed via local testing 2026-07-10; mongod
  # refuses to start otherwise with "BadValue: security.keyFile is required
  # when authorization is enabled with replica sets"). Generated inside the
  # container, not via host bind-mount permissions, so it behaves the same
  # on QNAP (Linux) as it did in local Mac testing.
  mongo-keyfile-init:
    image: mongo:7
    container_name: chad-mongo-keyfile-init-prod
    restart: "no"
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -e
        if [ -f /keyfile-data/mongo-keyfile ]; then
          echo "Keyfile already exists, leaving it as-is."
        else
          echo "Generating new mongo keyfile..."
          openssl rand -base64 756 > /keyfile-data/mongo-keyfile
        fi
        chmod 400 /keyfile-data/mongo-keyfile
        chown 999:999 /keyfile-data/mongo-keyfile
    volumes:
      - "${QNAP_CONTAINER_DATA_PATH:-/share/ContainerData}/chad/mongodb/keyfile:/keyfile-data"

  mongodb:
    image: mongo:7
    container_name: chad-mongodb-prod
    restart: unless-stopped
    command: ["--replSet", "rs0", "--bind_ip_all", "--keyFile", "/data/mongo-keyfile"]
    depends_on:
      mongo-keyfile-init:
        condition: service_completed_successfully
    ports:
      - "${MONGODB_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: "${MONGO_ROOT_USERNAME}"
      MONGO_INITDB_ROOT_PASSWORD: "${MONGO_ROOT_PASSWORD}"
    volumes:
      - "${QNAP_CONTAINER_DATA_PATH:-/share/ContainerData}/chad/mongodb/db:/data/db"
      - "${QNAP_CONTAINER_DATA_PATH:-/share/ContainerData}/chad/mongodb/configdb:/data/configdb"
      - "${QNAP_CONTAINER_DATA_PATH:-/share/ContainerData}/chad/mongodb/backups:/backups"
      - "${QNAP_CONTAINER_DATA_PATH:-/share/ContainerData}/chad/mongodb/keyfile/mongo-keyfile:/data/mongo-keyfile:ro"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "--quiet",
          "--eval",
          "db.adminCommand('ping')",
          "-u",
          "${MONGO_ROOT_USERNAME}",
          "-p",
          "${MONGO_ROOT_PASSWORD}",
          "--authenticationDatabase",
          "admin",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  mongo-rs-init:
    image: mongo:7
    container_name: chad-mongo-rs-init-prod
    restart: "no"
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./bash-scripts/mongo/rs-init.js:/mongo-rs-init.js:ro
    entrypoint:
      - mongosh
      - "mongodb://mongodb:27017/admin"
      - "-u"
      - "${MONGO_ROOT_USERNAME}"
      - "-p"
      - "${MONGO_ROOT_PASSWORD}"
      - "--authenticationDatabase"
      - "admin"
      - "/mongo-rs-init.js"
