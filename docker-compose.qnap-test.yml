# Docker Compose — QNAP TEST environment, full stack (mongo + content-provider-api
# + dashboard). Used by bash-scripts/dashboard/04_qnap_test/*.sh and
# bash-scripts/dashboard/06_qnap_ssh/*_test.sh. Env file: .env.qnap (shared with qnap-prod)
# (copy from .env.qnap.example, never commit the real one).
#
# Runtime na QNAP to WYŁĄCZNIE docker-compose (bez tmuxinator — tmuxinator jest
# tylko lokalnym workflow developerskim).
#
# NOTE: this is a DIFFERENT deployment from packages/net-content-provider/
# 03_scripts/qnap/*.sh, which deploys a standalone content-provider-api +
# Blazor GUI (no mongo, no dashboard) via plain `docker run`. Both can coexist
# on the same QNAP — see .env.qnap.example for the port-overlap note
# (net-content-provider's own Blazor defaults to 12020).
#
# Dane MongoDB MUSZĄ być na trwałym bind mouncie QNAP, nie w warstwie kontenera.
#
# PRZYGOTOWANE, NIE WDROŻONE (2026-07-10): mongodb działa jako single-node
# replica set (rs0), bo beeper-oplog wymaga change streams. Init jest
# idempotentny (mongo-rs-init, patrz bash-scripts/mongo/rs-init.js) — bezpieczny
# do wielokrotnego uruchomienia. Zanim to pójdzie na realny QNAP, patrz
# documentation/ai-docs/2026-07-10_mongodb-replica-set-migration-plan.md.

services:
  mongo-keyfile-init:
    image: mongo:7
    container_name: chad-mongo-keyfile-init-test
    restart: "no"
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -e
        if [ -f /keyfile-data/mongo-keyfile ]; then
          echo "Keyfile already exists, leaving it as-is."
        else
          echo "Generating new mongo keyfile..."
          openssl rand -base64 756 > /keyfile-data/mongo-keyfile
        fi
        chmod 400 /keyfile-data/mongo-keyfile
        chown 999:999 /keyfile-data/mongo-keyfile
    volumes:
      - "${QNAP_CONTAINER_DATA_PATH:-/share/ContainerData}/chad-test/mongodb/keyfile:/keyfile-data"

  mongodb:
    image: mongo:7
    container_name: chad-mongodb-test
    restart: unless-stopped
    command: ["--replSet", "rs0", "--bind_ip_all", "--keyFile", "/data/mongo-keyfile"]
    depends_on:
      mongo-keyfile-init:
        condition: service_completed_successfully
    ports:
      - "${MONGODB_PORT:-27018}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: "${MONGO_ROOT_USERNAME}"
      MONGO_INITDB_ROOT_PASSWORD: "${MONGO_ROOT_PASSWORD}"
    volumes:
      - "${QNAP_CONTAINER_DATA_PATH:-/share/ContainerData}/chad-test/mongodb/db:/data/db"
      - "${QNAP_CONTAINER_DATA_PATH:-/share/ContainerData}/chad-test/mongodb/configdb:/data/configdb"
      - "${QNAP_CONTAINER_DATA_PATH:-/share/ContainerData}/chad-test/mongodb/backups:/backups"
      - "${QNAP_CONTAINER_DATA_PATH:-/share/ContainerData}/chad-test/mongodb/keyfile/mongo-keyfile:/data/mongo-keyfile:ro"
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "--quiet",
          "--eval",
          "db.adminCommand('ping')",
          "-u",
          "${MONGO_ROOT_USERNAME}",
          "-p",
          "${MONGO_ROOT_PASSWORD}",
          "--authenticationDatabase",
          "admin",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  mongo-rs-init:
    image: mongo:7
    container_name: chad-mongo-rs-init-test
    restart: "no"
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./bash-scripts/mongo/rs-init.js:/mongo-rs-init.js:ro
    entrypoint:
      - mongosh
      - "mongodb://mongodb:27017/admin"
      - "-u"
      - "${MONGO_ROOT_USERNAME}"
      - "-p"
      - "${MONGO_ROOT_PASSWORD}"
      - "--authenticationDatabase"
      - "admin"
      - "/mongo-rs-init.js"

  content-provider-api:
    build:
      context: packages/net-content-provider
      dockerfile: 04_dockerfiles/webapi
    container_name: chad-content-provider-api-test
    restart: unless-stopped
    ports:
      - "${CONTENT_PROVIDER_API_PORT:-12024}:12024"
    environment:
      - PreparerModule__NoSqlRepoSearchPaths__0=/data/repos
    volumes:
      # Parent of "repos/", not repos/ itself — see
      # documentation/content-provider/next-tasks/qnap-test-deployment.md §6.
      - "${CP_REPOS_HOST_PATH:-/share/Dropbox}:/data/repos:rw"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:12024/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  dashboard:
    build:
      context: .
      dockerfile: packages/dashboard/Dockerfile
      target: runner
    container_name: chad-dashboard-test
    restart: unless-stopped
    ports:
      - "${DASHBOARD_PORT:-12025}:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - CONTENT_PROVIDER_API_URL=http://content-provider-api:12024
      - DATABASE_URL=file:/app/data/dev.db
    depends_on:
      content-provider-api:
        condition: service_healthy
    volumes:
      - chad-dashboard-test-data:/app/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  chad-dashboard-test-data:
    name: chad-dashboard-qnap-test-data
