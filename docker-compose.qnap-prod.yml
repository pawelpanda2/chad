# Docker Compose — QNAP PROD environment, full stack (mongo + content-provider-api
# + dashboard). Used by bash-scripts/dashboard/05_qnap_prod/*.sh and
# bash-scripts/dashboard/06_qnap_ssh/*_prod.sh. Env file: .env.qnap (shared with qnap-test)
# (copy from .env.qnap.example, never commit the real one).
#
# PROD deployment requires separate explicit approval — this file existing
# does not deploy anything by itself.
#
# Dane MongoDB na trwałym bind mouncie QNAP — usunięcie kontenera
# (docker compose down) NIE usuwa danych, dopóki bind mount zostaje. Usuwa
# dane tylko skasowanie katalogu na hoście QNAP
# ($QNAP_CONTAINER_DATA_PATH/chad/mongodb/db).
#
# Backup logiczny: patrz bash-scripts/mongo/backup.sh (mongodump).
#
# PRZYGOTOWANE, NIE WDROŻONE (2026-07-10): mongodb skonfigurowane jako
# single-node replica set (rs0) z idempotentnym init-kontenerem. TA
# KONFIGURACJA MA POZOSTAĆ NIEUŻYWANA na produkcji, dopóki nie zostanie
# jawnie zatwierdzone jej uruchomienie — patrz
# documentation/ai-docs/2026-07-10_mongodb-replica-set-migration-plan.md.

services:
  mongo-keyfile-init:
    image: mongo:7
    container_name: chad-mongo-keyfile-init-prod
    restart: "no"
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -e
        if [ -f /keyfile-data/mongo-keyfile ]; then
          echo "Keyfile already exists, leaving it as-is."
        else
          echo "Generating new mongo keyfile..."
          openssl rand -base64 756 > /keyfile-data/mongo-keyfile
        fi
        chmod 400 /keyfile-data/mongo-keyfile
        chown 999:999 /keyfile-data/mongo-keyfile
    volumes:
      - "${QNAP_CONTAINER_DATA_PATH:-/share/ContainerData}/chad/mongodb/keyfile:/keyfile-data"

  mongodb:
    image: mongo:7
    container_name: chad-mongodb-prod
    restart: unless-stopped
    command: ["--replSet", "rs0", "--bind_ip_all", "--keyFile", "/data/mongo-keyfile"]
    depends_on:
      mongo-keyfile-init:
        condition: service_completed_successfully
    ports:
      - "${MONGODB_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: "${MONGO_ROOT_USERNAME}"
      MONGO_INITDB_ROOT_PASSWORD: "${MONGO_ROOT_PASSWORD}"
    volumes:
      - "${QNAP_CONTAINER_DATA_PATH:-/share/ContainerData}/chad/mongodb/db:/data/db"
      - "${QNAP_CONTAINER_DATA_PATH:-/share/ContainerData}/chad/mongodb/configdb:/data/configdb"
      - "${QNAP_CONTAINER_DATA_PATH:-/share/ContainerData}/chad/mongodb/backups:/backups"
      - "${QNAP_CONTAINER_DATA_PATH:-/share/ContainerData}/chad/mongodb/keyfile/mongo-keyfile:/data/mongo-keyfile:ro"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "--quiet",
          "--eval",
          "db.adminCommand('ping')",
          "-u",
          "${MONGO_ROOT_USERNAME}",
          "-p",
          "${MONGO_ROOT_PASSWORD}",
          "--authenticationDatabase",
          "admin",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  mongo-rs-init:
    image: mongo:7
    container_name: chad-mongo-rs-init-prod
    restart: "no"
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./bash-scripts/mongo/rs-init.js:/mongo-rs-init.js:ro
    entrypoint:
      - mongosh
      - "mongodb://mongodb:27017/admin"
      - "-u"
      - "${MONGO_ROOT_USERNAME}"
      - "-p"
      - "${MONGO_ROOT_PASSWORD}"
      - "--authenticationDatabase"
      - "admin"
      - "/mongo-rs-init.js"

  content-provider-api:
    image: chad-content-provider-api:${IMAGE_TAG:-latest}
    build:
      context: packages/net-content-provider
      dockerfile: 04_dockerfiles/webapi
    container_name: chad-content-provider-api-prod
    restart: unless-stopped
    ports:
      - "${CONTENT_PROVIDER_API_PORT:-12034}:12024"
    environment:
      - PreparerModule__NoSqlRepoSearchPaths__0=/data/repos
    volumes:
      - "${CP_REPOS_HOST_PATH:-/share/Dropbox}:/data/repos:rw"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:12024/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  dashboard:
    image: chad-dashboard:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: packages/dashboard/Dockerfile
      target: runner
    container_name: chad-dashboard-prod
    restart: unless-stopped
    ports:
      - "${DASHBOARD_PORT:-12035}:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - CONTENT_PROVIDER_API_URL=http://content-provider-api:12024
      - DATABASE_URL=file:/app/data/dev.db
    depends_on:
      content-provider-api:
        condition: service_healthy
    volumes:
      - chad-dashboard-prod-data:/app/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  chad-dashboard-prod-data:
    name: chad-dashboard-qnap-prod-data
