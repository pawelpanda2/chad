# Docker Compose — local Mac dev, full stack under Docker (postgres + mongo +
# dashboard). Used by bash-scripts/dashboard/03_local_mac_docker/*.sh. Env
# file: .env.local (shared with 02_local_mac — copy from .env.local.example,
# never commit the real one).
#
# Story 80: PostgreSQL is now CHAD's own datastore
# (cp_items/cp_history/cp_outbox_*) — DBA_PRIMARY_BACKEND=postgres,
# DBA_MONGO_ENABLED=false. `mongodb` stays in this stack for local Beeper
# CRM testing only (BEEPER_MONGODB_URI, per-user `beeper_<repoGuid>`
# databases — entirely separate from CHAD's own data and unaffected by this
# Story). Before running the dashboard against a fresh Postgres volume, run
# `POSTGRES_URI=... node packages/dba/scripts/apply-postgres-migrations.mjs`
# once to create the schema.
#
# Content Provider (content-provider-api) removed from this stack — the
# .NET adapter code (`NetFileCpProvider`) and the `net-content-provider`
# submodule are untouched; this is a deployment-only change, reversible by
# re-adding the service below.
#
# For local dev WITHOUT Docker (pnpm/tmuxinator instead), see
# bash-scripts/dashboard/02_local_mac/ — that path runs mongo standalone (no
# replica set) too, matching this file's mongo service.

services:
  # Story 80 — CHAD's PostgreSQL datastore (cp_items/cp_history/outboxes).
  # `mongodb` below stays running for local Beeper testing only (Beeper CRM
  # is unaffected by this Story) — CHAD's own data no longer needs it once
  # DBA_PRIMARY_BACKEND=postgres (see the dashboard service's env below).
  postgres:
    image: postgres:17
    container_name: chad-postgres-local-mac-docker
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-chad}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - POSTGRES_DB=${POSTGRES_DB:-chad}
    volumes:
      - chad-postgres-local-mac-docker-db:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U ${POSTGRES_USER:-chad} -d ${POSTGRES_DB:-chad}
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    container_name: chad-mongodb-local-mac-docker
    restart: unless-stopped
    ports:
      - "${MONGODB_PORT:-27017}:27017"
    command: mongod --replSet rs0 --oplogSize 1024
    volumes:
      - chad-mongodb-local-mac-docker-db:/data/db
      - chad-mongodb-local-mac-docker-configdb:/data/configdb
      - ./bash-scripts/mongo/backups:/backups
    healthcheck:
      test: mongosh --eval "db.adminCommand('ping')" || exit 1
      interval: 10s
      timeout: 5s
      retries: 5

  dashboard:
    # No ":latest" fallback - own CHAD images must be deployed by an explicit
    # release tag (see ai-docs/bash-scripts/image-tagging-standard.md).
    # 03_local_mac_docker/03_re-start.sh sets IMAGE_TAG before calling this; the
    # required-var syntax below is a defense-in-depth backstop.
    image: "chad-dashboard:${IMAGE_TAG:?IMAGE_TAG is required, see ai-docs/bash-scripts/image-tagging-standard.md}"
    build:
      context: .
      dockerfile: packages/dashboard/Dockerfile
      target: runner
      # Dev Panel is meant to be visible in local dev (see
      # packages/dashboard/app/layout.tsx's own comment: it's compiled in
      # only when NEXT_PUBLIC_ENABLE_DEV_PANEL is set at build time). This
      # compose file's `build.args` never passed the Dockerfile's
      # `ARG ENABLE_DEV_PANEL` before, so it silently defaulted to `false`
      # on every local-mac-docker build regardless of who ran it — not a
      # regression from any one build, a pre-existing gap in this file.
      # QNAP test/prod use entirely separate compose files and are
      # unaffected by this.
      args:
        ENABLE_DEV_PANEL: "true"
    container_name: chad-dashboard-local-mac-docker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    ports:
      - "${DASHBOARD_PORT:-12020}:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - DATABASE_URL=file:/app/data/dev.db
      # Story 80 — CHAD's PostgreSQL datastore (cp_items/cp_history/
      # outboxes). See postgres.ts; POSTGRES_URI is read lazily the same
      # way MONGODB_URI is.
      - POSTGRES_URI=${POSTGRES_URI:-postgres://${POSTGRES_USER:-chad}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-chad}}
      # From .env.local (DBA_MONGO_MODE=local, default) or overridden by
      # 01_config.sh (DBA_MONGO_MODE=qnap — points at QNAP's chad-mongodb
      # over Tailscale instead, see that file). Must use host.docker.internal
      # (not localhost) if ever pointed at a MongoDB published on the host
      # directly, since this runs inside the container's own network
      # namespace — not needed for either DBA_MONGO_MODE today (local mode
      # uses the sibling `mongodb` service by Compose service name, qnap
      # mode uses QNAP's real Tailscale IP). Only relevant to Beeper now
      # (see BEEPER_MONGODB_URI below) — CHAD's own cp_items no longer read
      # this once DBA_PRIMARY_BACKEND=postgres.
      - MONGODB_URI=${MONGODB_URI:-mongodb://mongodb:27017/chad}
      # Beeper CRM's Mongo *server* URI — same physical mongo server as
      # MONGODB_URI. Story 73: each CHAD user gets their own
      # `beeper_<repoGuid>` database (contacts/channels/messages/
      # timeline_events/..., predates this monorepo — ported from the
      # standalone `contacts` repo), computed by dba's getBeeperMongoDb(),
      # never a database segment on this URI. Never merged into `chad`
      # alongside CP items. This is the ONLY thing `mongodb` above is still
      # needed for locally, post-Story-80.
      - BEEPER_MONGODB_URI=${BEEPER_MONGODB_URI:-mongodb://mongodb:27017}
      # Story 80 data-providers config (packages/dba/src/data-providers/
      # config.ts) — PostgreSQL is now the primary/only backend for CHAD's
      # own cp_items; DBA_MONGO_ENABLED=false here means Mongo is never even
      # registered as a CP-items provider (Beeper's connection is separate
      # and unaffected — see BEEPER_MONGODB_URI above).
      - DBA_MONGO_ENABLED=${DBA_MONGO_ENABLED:-false}
      - DBA_CONTENT_PROVIDER_ENABLED=${DBA_CONTENT_PROVIDER_ENABLED:-false}
      - DBA_POSTGRES_ENABLED=${DBA_POSTGRES_ENABLED:-true}
      - DBA_PRIMARY_BACKEND=${DBA_PRIMARY_BACKEND:-postgres}
      - DBA_FOLLOWER_WRITES_ENABLED=${DBA_FOLLOWER_WRITES_ENABLED:-false}
      - DBA_SHADOW_READS_ENABLED=${DBA_SHADOW_READS_ENABLED:-false}
      # Always "local" here, never "prod" — regardless of DBA_MONGO_MODE
      # (even a DBA_MONGO_MODE=qnap session pointed at QNAP's real Mongo,
      # see 01_config.sh). The Google Sheets sync worker
      # (packages/dba/src/google-sheets/production-guard.ts) only ever
      # starts when CHAD_ENVIRONMENT=prod — it must run in exactly one
      # place, the real deployed PROD container, never a developer machine.
      - CHAD_ENVIRONMENT=local
      # Story 75 — Google Sheets sync (packages/dba/src/google-sheets/).
      # Previously never passed through to this container at all (the
      # integration's real-sheet verification was done via a one-off
      # scratchpad script, not the running Dashboard) — the sync worker now
      # runs inside this same process via instrumentation.ts, so these must
      # actually reach it. See ai-docs/google-sheets/architecture.md.
      - GOOGLE_SHEETS_ENABLED=${GOOGLE_SHEETS_ENABLED:-false}
      - GOOGLE_SHEETS_SPREADSHEET_MAP=${GOOGLE_SHEETS_SPREADSHEET_MAP:-}
      - GOOGLE_SHEETS_DAILY_TRACKER_SHEET_NAME=${GOOGLE_SHEETS_DAILY_TRACKER_SHEET_NAME:-}
      - GOOGLE_SHEETS_DATE_ENTRIES_SHEET_NAME=${GOOGLE_SHEETS_DATE_ENTRIES_SHEET_NAME:-}
      - GOOGLE_SERVICE_ACCOUNT_EMAIL=${GOOGLE_SERVICE_ACCOUNT_EMAIL:-}
      - GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY=${GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY:-}
      # Optional — shown on History -> Google Sheets so a user can log into
      # the shared viewing account. Unset = that section just doesn't render.
      - GOOGLE_SHEETS_VIEWER_ACCOUNT_EMAIL=${GOOGLE_SHEETS_VIEWER_ACCOUNT_EMAIL:-}
      - GOOGLE_SHEETS_VIEWER_ACCOUNT_PASSWORD=${GOOGLE_SHEETS_VIEWER_ACCOUNT_PASSWORD:-}
    volumes:
      - chad-dashboard-local-mac-docker-data:/app/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # history-worker (Story 74/78's Change-Stream consumer) is retired as of
  # Story 79 — cp_history is now written transactionally by the Dashboard's
  # own dba layer (executeCpMutationWithHistory), alongside every cp_items
  # write, instead of by a separate async process. See
  # ai-docs/history/how-it-works.md. rs0 itself stays (still required for
  # multi-document transactions, not just Change Streams).

volumes:
  chad-postgres-local-mac-docker-db:
    name: chad-postgres-local-mac-docker-db
  chad-mongodb-local-mac-docker-db:
    name: chad-mongodb-local-mac-docker-db
  chad-mongodb-local-mac-docker-configdb:
    name: chad-mongodb-local-mac-docker-configdb
  chad-dashboard-local-mac-docker-data:
    name: chad-dashboard-local-mac-docker-data
