# Docker Compose — local Mac dev, full stack under Docker (mongo +
# content-provider-api + dashboard). Used by
# bash-scripts/dashboard/03_local_mac_docker/*.sh. Env file: .env.local
# (shared with 02_local_mac — copy from .env.local.example, never commit
# the real one).
#
# For local dev WITHOUT Docker (pnpm/tmuxinator instead), see
# bash-scripts/dashboard/02_local_mac/ — that path runs mongo standalone (no
# replica set) too, matching this file's mongo service.

services:
  mongodb:
    image: mongo:7
    container_name: chad-mongodb-local-mac-docker
    restart: unless-stopped
    ports:
      - "${MONGODB_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: "${MONGO_ROOT_USERNAME:-change_me}"
      MONGO_INITDB_ROOT_PASSWORD: "${MONGO_ROOT_PASSWORD:-change_me}"
    volumes:
      - chad-mongodb-local-mac-docker-db:/data/db
      - chad-mongodb-local-mac-docker-configdb:/data/configdb
      - ./bash-scripts/mongo/backups:/backups

  # Content Provider API — .NET backend, same Dockerfile already built and
  # tested this session for QNAP TEST (packages/net-content-provider/
  # 03_scripts/qnap/build_qnap_test.sh uses the identical Dockerfile).
  content-provider-api:
    # No ":latest" fallback - own CHAD images must be deployed by an explicit
    # release tag (see documentation/ai-docs/deploy/image-tagging-standard.md).
    # 03_local_mac_docker/03_restart.sh sets IMAGE_TAG before calling this; the
    # required-var syntax below is a defense-in-depth backstop.
    image: "chad-content-provider-api:${IMAGE_TAG:?IMAGE_TAG is required, see documentation/ai-docs/deploy/image-tagging-standard.md}"
    build:
      context: packages/net-content-provider
      dockerfile: 04_dockerfiles/webapi
    container_name: chad-content-provider-api-local-mac-docker
    restart: unless-stopped
    ports:
      - "${CONTENT_PROVIDER_API_PORT:-12024}:12024"
    volumes:
      # Must be the PARENT of a "repos/" folder, not repos/ itself — see
      # documentation/content-provider/next-tasks/qnap-test-deployment.md §6.
      # :rw (not :ro) — the app writes an index/store into this root at
      # runtime (confirmed by packages/dashboard/cp-root/.docstore existing
      # on disk from earlier local use).
      - "${CP_REPOS_HOST_PATH:-./packages/dashboard/cp-root}:/data/repos:rw"
      # Second independent repo search root (Story 68, 2026-07-17): the
      # chad_admin login repo (users/users-list, used by
      # app/api/auth/login/route.ts) currently only physically exists under
      # this second Dropbox share, not under CP_REPOS_HOST_PATH above — login
      # fails with "Content Provider API is unavailable" without this mount.
      - "${CP_REPOS_HOST_PATH_2:-./packages/dashboard/cp-root}:/data/repos2:rw"
      # Full appsettings.json generated by 01_config.sh's
      # write_content_provider_appsettings (see that file for the embedded
      # text) — overrides the image's baked-in appsettings.json entirely,
      # read-only, regenerated fresh by 03_restart.sh before every `up -d`.
      - "./.runtime/local/content-provider/appsettings.json:/app/appsettings.json:ro"
    # No Docker-level healthcheck: mcr.microsoft.com/dotnet/aspnet:8.0 has
    # neither wget nor curl, so a CMD-based check can't run inside the
    # container (confirmed: "exec: wget: executable file not found").
    # packages/net-content-provider's own proven scripts don't use one
    # either — they poll /health from the host after `docker run`. Do the
    # same here: 03_restart.sh polls http://localhost:$CONTENT_PROVIDER_API_PORT/health
    # after `up -d`, so depends_on below only needs the container started.

  dashboard:
    # No ":latest" fallback - own CHAD images must be deployed by an explicit
    # release tag (see documentation/ai-docs/deploy/image-tagging-standard.md).
    # 03_local_mac_docker/03_restart.sh sets IMAGE_TAG before calling this; the
    # required-var syntax below is a defense-in-depth backstop.
    image: "chad-dashboard:${IMAGE_TAG:?IMAGE_TAG is required, see documentation/ai-docs/deploy/image-tagging-standard.md}"
    build:
      context: .
      dockerfile: packages/dashboard/Dockerfile
      target: runner
      # Dev Panel is meant to be visible in local dev (see
      # packages/dashboard/app/layout.tsx's own comment: it's compiled in
      # only when NEXT_PUBLIC_ENABLE_DEV_PANEL is set at build time). This
      # compose file's `build.args` never passed the Dockerfile's
      # `ARG ENABLE_DEV_PANEL` before, so it silently defaulted to `false`
      # on every local-mac-docker build regardless of who ran it — not a
      # regression from any one build, a pre-existing gap in this file.
      # QNAP test/prod use entirely separate compose files and are
      # unaffected by this.
      args:
        ENABLE_DEV_PANEL: "true"
    container_name: chad-dashboard-local-mac-docker
    restart: unless-stopped
    ports:
      - "${DASHBOARD_PORT:-12020}:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      # Docker network DNS — internal port is always 12024 regardless of
      # the published host port above.
      - CONTENT_PROVIDER_API_URL=http://content-provider-api:12024
      - DATABASE_URL=file:/app/data/dev.db
      # From .env.local — must use host.docker.internal (not localhost) to
      # reach a MongoDB published on the host, since this runs inside the
      # container's own network namespace.
      - MONGODB_URI=${MONGODB_URI:-}
    depends_on:
      content-provider-api:
        condition: service_started
    volumes:
      - chad-dashboard-local-mac-docker-data:/app/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  chad-mongodb-local-mac-docker-db:
    name: chad-mongodb-local-mac-docker-db
  chad-mongodb-local-mac-docker-configdb:
    name: chad-mongodb-local-mac-docker-configdb
  chad-dashboard-local-mac-docker-data:
    name: chad-dashboard-local-mac-docker-data
