# Docker Compose — QNAP SHARED services: MongoDB + Content Provider API.
# Used by BOTH docker-compose.qnap.test.yml and docker-compose.qnap.prod.yml
# (their dashboard containers reach these by container_name over the
# external "chad-shared" network, not by compose service name — service
# names only resolve within the SAME compose project). Started/stopped
# independently by bash-scripts/dashboard/00_qnap_shared/*.sh — never by the
# test/prod dashboard scripts. Env file: .env.qnap.
#
# Runtime na QNAP to WYŁĄCZNIE docker-compose (bez tmuxinator).
#
# Two MongoDB instances (Story 76, 2026-07-22 — physical split, see
# ai-docs/deploy/2026-07-22_mongodb-chad-beeper-split.md), one Content
# Provider, shared by TEST and PROD dashboards — TEST is an alternative UI
# onto the same live data, not an isolated data environment. See
# documentation/dashboard/common/features/shared-qnap-services.md.
#
# - chad-mongodb: cp_items/cp_history/cp_history_state/
#   google_sheets_sync_outbox. Replica set rs0 (Change Streams).
# - beeper-mongodb: every beeper_<repoGuid> database. Standalone —
#   deliberately NO replica set, NO Change Streams, ever (explicit user
#   decision) — durability via periodic mongodump instead.
#
# Dane obu instancji MongoDB MUSZĄ być na trwałym bind moуncie QNAP
# ($QNAP_CONTAINER_DATA_PATH/chad-shared/{mongodb,beeper-mongodb}/db).
# docker compose down (bez -v) nigdy nie usuwa tych danych — usuwa je tylko
# skasowanie katalogu na hoście.
#
# Backup logiczny (bash-scripts/mongo/backup.sh, already parameterized by
# MONGO_CONTAINER_NAME — no script changes needed, only correct env vars
# per instance since beeper-mongodb gets its own separate credentials):
#   MONGO_CONTAINER_NAME=chad-mongodb \
#     MONGO_ROOT_USERNAME="$MONGO_ROOT_USERNAME" MONGO_ROOT_PASSWORD="$MONGO_ROOT_PASSWORD" \
#     bash bash-scripts/mongo/backup.sh
#   MONGO_CONTAINER_NAME=beeper-mongodb \
#     MONGO_ROOT_USERNAME="$BEEPER_MONGO_ROOT_USERNAME" MONGO_ROOT_PASSWORD="$BEEPER_MONGO_ROOT_PASSWORD" \
#     bash bash-scripts/mongo/backup.sh
#
# mongodb: single-node replica set `rs0` (Story 74, 2026-07-20) — enabled
# for MongoDB Change Streams (cp_history). Converts the EXISTING,
# already-authenticated standalone chad-mongodb (real data, real users) in
# place; this does not touch /data/db contents, indexes, or existing
# SCRAM-SHA-256 user records — MongoDB's own standalone->replica-set
# conversion is data-preserving by design, and MONGO_INITDB_ROOT_USERNAME/
# PASSWORD are only ever consulted by docker-entrypoint.sh when /data/db is
# EMPTY (never the case here), so no re-bootstrap of auth is attempted.
#
# History (why this was gated, and why it's safe to enable now): see
# ai-docs/deploy/2026-07-10_mongodb-replica-set-migration-plan.md and
# `git show b084f55` (2026-07-11 revert to standalone). That real QNAP TEST
# attempt's healthcheck never passed and mongo-rs-init never ran — but the
# ACTUAL root cause (confirmed by re-reading the reverted diff) was that
# both the healthcheck and mongo-rs-init used `mongosh`, which mongo:4.4
# does not bundle (only the legacy `mongo` shell) — a plain missing-binary
# failure, not an auth/replSet bootstrap ordering problem as first
# suspected. This was already fixed for the standalone healthcheck below
# (commit 9978175, same day) but never re-verified against the replica-set
# path since replica set was reverted first. This re-attempt uses `mongo`
# (legacy shell) everywhere, never `mongosh`. Gating preconditions from the
# migration plan doc are now met: `packages/beeper-oplog` exists in this
# monorepo, and this Story is the separate explicit approval.
#
# Member host identity is `chad-mongodb:27017` (container_name), NOT
# `mongodb:27017` (compose service name) — the original rs-init.js/plan
# predates the shared/test/prod split (2026-07-11) and assumed one compose
# project for everything, where service-name DNS was enough. Since
# 2026-07-11, dashboard-test/prod live in SEPARATE compose projects and only
# ever reach Mongo by container_name (see shared-qnap-services.md, "DNS
# between separate Compose projects") — the replica set's own member
# identity must match that same, already-proven-reachable name.
#
# mongo:4.4 (not mongo:7) — this QNAP's CPU lacks AVX, required by MongoDB
# 5.0+. Confirmed real crash loop with mongo:7 on this host.
#
# Content Provider (content-provider-api) removed from this stack — Mongo
# is the only active runtime backend now (DBA_CONTENT_PROVIDER_ENABLED=false,
# DBA_PRIMARY_BACKEND=mongo, same as local-mac-docker). The .NET adapter
# code (`NetFileCpProvider`) and the `net-content-provider` submodule are
# untouched; this is a deployment-only change, reversible by re-adding the
# service below (see git history for the removed block: image, build
# context packages/net-content-provider, CP_REPOS_HOST_PATH/_2 volume
# mounts, appsettings.json bind mount).
services:
  # Idempotent — if the keyfile already exists on the persistent volume,
  # leaves it untouched (never rotates a key under a running replica set,
  # which would break member auth). Generated INSIDE a Linux container
  # rather than bind-mounted with host-set permissions, so `chmod
  # 400`/`chown 999:999` (the mongodb user's UID/GID in the official image)
  # behave identically on QNAP as they were tested locally — see
  # 2026-07-10_mongodb-replica-set-migration-plan.md §2.
  mongo-keyfile-init:
    image: mongo:4.4
    container_name: chad-mongo-keyfile-init
    restart: "no"
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -e
        if [ -f /keyfile-data/mongo-keyfile ]; then
          echo "Keyfile already exists, leaving it as-is."
        else
          echo "Generating new mongo keyfile..."
          openssl rand -base64 756 > /keyfile-data/mongo-keyfile
        fi
        chmod 400 /keyfile-data/mongo-keyfile
        chown 999:999 /keyfile-data/mongo-keyfile
    volumes:
      - "${QNAP_CONTAINER_DATA_PATH:-/share/ContainerData}/chad-shared/mongodb/keyfile:/keyfile-data"

  mongodb:
    image: mongo:4.4
    container_name: chad-mongodb
    restart: unless-stopped
    # --oplogSize 1024 (MB): explicit, deliberate value rather than trusting
    # the auto-computed default (~5% of free disk space — this QNAP has
    # 2.8TB free, which could auto-size the oplog far larger than this
    # workload needs). Revisit if `rs.printReplicationInfo()`'s oplog window
    # (Story 74 preflight) turns out too short in practice.
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all", "--keyFile", "/data/mongo-keyfile", "--oplogSize", "1024"]
    depends_on:
      mongo-keyfile-init:
        condition: service_completed_successfully
    # Host port 12040 published (2026-07-19) so MongoDB Compass and other
    # host-side tools can connect over Tailscale
    # (mongodb://<user>:<pass>@100.117.139.83:12040/chad?authSource=admin&directConnection=true).
    # `directConnection=true` is now required for this external path once
    # rs0 is enabled — a host-level client can't resolve `chad-mongodb` to
    # discover full replica-set topology, so it must talk to this one node
    # directly instead (see rs-init.js's own doc comment).
    # 12040, not the container's native 27017: this project's QNAP port
    # convention reserves 12020-12029 for TEST and 12030-12039 for PROD —
    # 12040 is the next slot just past both ranges, not a random pick.
    # QNAP's own Tailscale IP is only reachable over the Tailscale VPN, not
    # the public internet, so this does not expose Mongo publicly.
    # Dashboards/CP inside chad-shared still reach this by container_name
    # (chad-mongodb:27017), unaffected — this only adds a second, host-level
    # path in. `docker exec chad-mongodb mongo ...` /
    # bash-scripts/mongo/backup.sh still work exactly as before.
    ports:
      - "12040:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: "${MONGO_ROOT_USERNAME}"
      MONGO_INITDB_ROOT_PASSWORD: "${MONGO_ROOT_PASSWORD}"
    volumes:
      - "${QNAP_CONTAINER_DATA_PATH:-/share/ContainerData}/chad-shared/mongodb/db:/data/db"
      - "${QNAP_CONTAINER_DATA_PATH:-/share/ContainerData}/chad-shared/mongodb/configdb:/data/configdb"
      - "${QNAP_CONTAINER_DATA_PATH:-/share/ContainerData}/chad-shared/mongodb/backups:/backups"
      - "${QNAP_CONTAINER_DATA_PATH:-/share/ContainerData}/chad-shared/mongodb/keyfile/mongo-keyfile:/data/mongo-keyfile:ro"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      # "mongo" (legacy shell), not "mongosh" — mongo:4.4 doesn't bundle
      # mongosh. This ping succeeds pre- AND post-rs.initiate() (auth works
      # the same either way) — no replica-set-dependent behavior here.
      test:
        [
          "CMD",
          "mongo",
          "--quiet",
          "--eval",
          "db.adminCommand({ ping: 1 })",
          "-u",
          "${MONGO_ROOT_USERNAME}",
          "-p",
          "${MONGO_ROOT_PASSWORD}",
          "--authenticationDatabase",
          "admin",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # Idempotent (see bash-scripts/mongo/rs-init.js — safe to run on every
  # restart, only calls rs.initiate() the first time). Uses the legacy
  # `mongo` shell, NOT `mongosh` — same reason as the healthcheck above.
  mongo-rs-init:
    image: mongo:4.4
    container_name: chad-mongo-rs-init
    restart: "no"
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./bash-scripts/mongo/rs-init.js:/mongo-rs-init.js:ro
    entrypoint:
      - mongo
      - "mongodb://chad-mongodb:27017/admin"
      - "-u"
      - "${MONGO_ROOT_USERNAME}"
      - "-p"
      - "${MONGO_ROOT_PASSWORD}"
      - "--authenticationDatabase"
      - "admin"
      - "/mongo-rs-init.js"

  # Every beeper_<repoGuid> database (Story 73/76). Physically split from
  # chad-mongodb (2026-07-22) — deliberately standalone: NO --replSet, NO
  # keyfile, NO Change Streams, ever. This was an explicit user decision
  # (not a default/oversight) accepting the one named tradeoff: beeper-crm.ts's
  # live-update SSE endpoint degrades from instant (change-stream push) to
  # 5s polling — already implemented as poll-only in beeper-crm.ts, so this
  # container never needs to satisfy a change-stream consumer. Durability
  # comes from periodic mongodump instead (bash-scripts/mongo/backup.sh,
  # this file's own header comment). Separate credentials from chad-mongodb
  # on purpose (least privilege — a compromised Beeper container credential
  # must not also grant access to cp_items).
  beeper-mongodb:
    image: mongo:4.4
    container_name: beeper-mongodb
    restart: unless-stopped
    command: ["mongod", "--bind_ip_all"]
    # Host port 12041 published — same reasoning as chad-mongodb's 12040
    # (QNAP port convention reserves 12020-29/12030-39 for TEST/PROD;
    # 12040 is chad-mongodb's own diagnostic port, 12041 is the next free
    # slot, not a random pick). Reachable over Tailscale the same way:
    # mongodb://<user>:<pass>@100.117.139.83:12041/?authSource=admin
    # (no directConnection=true needed — standalone, no replica-set
    # topology to discover).
    ports:
      - "12041:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: "${BEEPER_MONGO_ROOT_USERNAME}"
      MONGO_INITDB_ROOT_PASSWORD: "${BEEPER_MONGO_ROOT_PASSWORD}"
    volumes:
      - "${QNAP_CONTAINER_DATA_PATH:-/share/ContainerData}/chad-shared/beeper-mongodb/db:/data/db"
      - "${QNAP_CONTAINER_DATA_PATH:-/share/ContainerData}/chad-shared/beeper-mongodb/configdb:/data/configdb"
      - "${QNAP_CONTAINER_DATA_PATH:-/share/ContainerData}/chad-shared/beeper-mongodb/backups:/backups"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      # "mongo" (legacy shell), not "mongosh" — same reason as
      # chad-mongodb's healthcheck above (mongo:4.4 doesn't bundle mongosh).
      test:
        [
          "CMD",
          "mongo",
          "--quiet",
          "--eval",
          "db.adminCommand({ ping: 1 })",
          "-u",
          "${BEEPER_MONGO_ROOT_USERNAME}",
          "-p",
          "${BEEPER_MONGO_ROOT_PASSWORD}",
          "--authenticationDatabase",
          "admin",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # history-worker (Story 74/78's Change-Stream consumer -> cp_history) is
  # retired as of Story 79 — cp_history is now written transactionally by
  # the Dashboard's own dba layer (executeCpMutationWithHistory), inside the
  # same MongoDB transaction as the cp_items write itself, instead of by a
  # separate async process reading the oplog after the fact. See
  # ai-docs/history/how-it-works.md. rs0 (enabled above) stays — MongoDB
  # still requires a replica set for the multi-document transactions Story
  # 79 uses, even though Change Streams are no longer the mechanism.

networks:
  default:
    name: chad-shared
    external: true
