# Docker Compose — QNAP SHARED services: MongoDB + Content Provider API.
# Used by BOTH docker-compose.qnap.test.yml and docker-compose.qnap.prod.yml
# (their dashboard containers reach these by container_name over the
# external "chad-shared" network, not by compose service name — service
# names only resolve within the SAME compose project). Started/stopped
# independently by bash-scripts/dashboard/00_qnap_shared/*.sh — never by the
# test/prod dashboard scripts. Env file: .env.qnap.
#
# Runtime na QNAP to WYŁĄCZNIE docker-compose (bez tmuxinator).
#
# One MongoDB, one Content Provider, shared by TEST and PROD dashboards —
# TEST is an alternative UI onto the same live data, not an isolated data
# environment. See documentation/dashboard/common/features/
# shared-qnap-services.md.
#
# Dane MongoDB MUSZĄ być na trwałym bind moуncie QNAP
# ($QNAP_CONTAINER_DATA_PATH/chad-shared/mongodb/db). docker compose down
# (bez -v) nigdy nie usuwa tych danych — usuwa je tylko skasowanie katalogu
# na hoście.
#
# Backup logiczny: bash-scripts/mongo/backup.sh
#   MONGO_CONTAINER_NAME=chad-mongodb bash bash-scripts/mongo/backup.sh
#
# mongodb: standalone (NOT a replica set) — see
# documentation/ai-docs/2026-07-10_mongodb-replica-set-migration-plan.md.
# Replica set stays unimplemented (gated behind beeper-oplog landing here +
# a separate explicit approval).
#
# mongo:4.4 (not mongo:7) — this QNAP's CPU lacks AVX, required by MongoDB
# 5.0+. Confirmed real crash loop with mongo:7 on this host.
#
# Content Provider (content-provider-api) removed from this stack — Mongo
# is the only active runtime backend now (DBA_CONTENT_PROVIDER_ENABLED=false,
# DBA_PRIMARY_BACKEND=mongo, same as local-mac-docker). The .NET adapter
# code (`NetFileCpProvider`) and the `net-content-provider` submodule are
# untouched; this is a deployment-only change, reversible by re-adding the
# service below (see git history for the removed block: image, build
# context packages/net-content-provider, CP_REPOS_HOST_PATH/_2 volume
# mounts, appsettings.json bind mount).
services:
  mongodb:
    image: mongo:4.4
    container_name: chad-mongodb
    restart: unless-stopped
    # Host port 12040 published (2026-07-19) so MongoDB Compass and other
    # host-side tools can connect over Tailscale
    # (mongodb://<user>:<pass>@100.117.139.83:12040/chad?authSource=admin).
    # 12040, not the container's native 27017: this project's QNAP port
    # convention reserves 12020-12029 for TEST and 12030-12039 for PROD —
    # 12040 is the next slot just past both ranges, not a random pick.
    # QNAP's own Tailscale IP is only reachable over the Tailscale VPN, not
    # the public internet, so this does not expose Mongo publicly.
    # Dashboards/CP inside chad-shared still reach this by container_name
    # (chad-mongodb:27017), unaffected — this only adds a second, host-level
    # path in. `docker exec chad-mongodb mongo ...` /
    # bash-scripts/mongo/backup.sh still work exactly as before.
    ports:
      - "12040:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: "${MONGO_ROOT_USERNAME}"
      MONGO_INITDB_ROOT_PASSWORD: "${MONGO_ROOT_PASSWORD}"
    volumes:
      - "${QNAP_CONTAINER_DATA_PATH:-/share/ContainerData}/chad-shared/mongodb/db:/data/db"
      - "${QNAP_CONTAINER_DATA_PATH:-/share/ContainerData}/chad-shared/mongodb/configdb:/data/configdb"
      - "${QNAP_CONTAINER_DATA_PATH:-/share/ContainerData}/chad-shared/mongodb/backups:/backups"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      # "mongo" (legacy shell), not "mongosh" — mongo:4.4 doesn't bundle
      # mongosh.
      test:
        [
          "CMD",
          "mongo",
          "--quiet",
          "--eval",
          "db.adminCommand({ ping: 1 })",
          "-u",
          "${MONGO_ROOT_USERNAME}",
          "-p",
          "${MONGO_ROOT_PASSWORD}",
          "--authenticationDatabase",
          "admin",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

networks:
  default:
    name: chad-shared
    external: true
