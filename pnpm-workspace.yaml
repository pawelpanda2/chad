packages:
  - 'packages/*'
  # content-provider is a group of separate packages (core/entry/files/mongo/
  # net-adapter), not one package itself — glob one level deeper for it.
  # Does NOT match packages/legacy-content-provider (no root package.json
  # there) or packages/cp-gui, packages/cp-plugin (those are packages/* already).
  - 'packages/content-provider/*'
