# Docker Compose for QNAP Production Environment
# Personal Dashboard - Next.js Application with Content Provider API
#
# Important: This configuration uses QNAP_CP_ROOT_PATH as the base path for:
#   - cp-root (Content Provider root directory)
#
# On QNAP, set QNAP_CP_ROOT_PATH environment variable, e.g.:
#   export QNAP_CP_ROOT_PATH=/share/cp_1
# or:
#   export QNAP_CP_ROOT_PATH=/share/cp_1/cp-root
#
# The script 03_scripts/nodejs/06_docker_qnap_prod/start_docker_image.sh
# will use this path to mount to /app/cp-root in the containers.

services:
  # Content Provider API - C# ASP.NET service
  content-provider-api:
    build:
      context: .
      dockerfile: Dockerfile.content-provider-api
    container_name: content-provider-api-prod
    ports:
      - "${CONTENT_PROVIDER_API_PORT:-12034}:12034"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:12034
      - CONTENT_PROVIDER_ROOT=/app/cp-root
      - CONTENT_PROVIDER_API_PORT=12034
    volumes:
      # Mount cp-root from QNAP host path (read-only)
      # QNAP_CP_ROOT_PATH is passed from start_docker_image.sh
      - ${QNAP_CP_ROOT_PATH:-/share/cp_1}:/app/cp-root:ro
    restart: unless-stopped
    networks:
      - personal-dashboard-prod-network
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:12034/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Personal Dashboard - Next.js application
  personal-dashboard-prod:
    image: personal-dashboard:${IMAGE_TAG}
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: personal-dashboard-prod
    ports:
      - "${PROD_FRONTEND_PORT:-12030}:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      # Content Provider API URL (using Docker network DNS)
      - CONTENT_PROVIDER_API_URL=http://content-provider-api:12034
      # Database URL for Prisma (SQLite)
      - DATABASE_URL=file:/app/data/dev.db
      # Session cookie settings (HTTP test environment - no Secure flag)
      - AUTH_COOKIE_SECURE=false
    restart: unless-stopped
    networks:
      - personal-dashboard-prod-network
    depends_on:
      content-provider-api:
        condition: service_healthy
    volumes:
      # Persistent data volume
      - personal-dashboard-prod-data:/app/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  personal-dashboard-prod-network:
    driver: bridge
    name: personal-dashboard-qnap-prod-network

volumes:
  personal-dashboard-prod-data:
    name: personal-dashboard-qnap-prod-data