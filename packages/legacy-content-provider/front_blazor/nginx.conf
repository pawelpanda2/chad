events {}

http {
    include       /etc/nginx/mime.types;

    default_type  application/octet-stream;

    server {
        listen 80;
        listen 5156;
        server_name localhost;

        root /usr/share/nginx/html;
        index index.html;

        # ------------------------------------------------------------
        # Blazor WASM (QNAP/NAS): najczęstszy problem to mieszanka wersji
        # plików z cache (np. nowy blazor.boot.json + stary dotnet.*.js).
        # ------------------------------------------------------------

        # 1) Nie cache'uj entry-pointów i manifestów
        location = /index.html {
            add_header Cache-Control "no-cache";
            try_files $uri =404;
        }

        location = /service-worker.js {
            add_header Cache-Control "no-cache";
            try_files $uri =404;
        }

        location = /_framework/blazor.boot.json {
            add_header Cache-Control "no-cache";
            try_files $uri =404;
        }

        location = /_framework/dotnet.js {
            add_header Cache-Control "no-cache";
            try_files $uri =404;
        }

        location = /_framework/dotnet.runtime.js {
            add_header Cache-Control "no-cache";
            try_files $uri =404;
        }

        location = /_framework/blazor.webassembly.js {
            add_header Cache-Control "no-cache";
            try_files $uri =404;
        }

        # 2) Rozdziel: pliki runtime jako pliki (bez SPA fallback)
        location /_framework/ {
            try_files $uri =404;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        location /_content/ {
            try_files $uri =404;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # 3) Obsługa prekompresowanych plików z dotnet publish
        #    - dla bezpieczeństwa na QNAP używamy tylko gzip_static (bez .br)
        gzip_static on;

        # Nie serwuj *.br (Brotli). Bez pełnej obsługi brotli w nginx łatwo o
        # ERR_CONTENT_DECODING_FAILED i błędy runtime (mono_download_assets).
        location ~* \.br$ {
            return 404;
        }

        # SPA fallback dla routingu po stronie klienta
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
